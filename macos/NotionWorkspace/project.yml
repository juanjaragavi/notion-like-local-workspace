name: NotionWorkspace
options:
  bundleIdPrefix: com.topnetworks
  deploymentTarget:
    macOS: "15.0"
  xcodeVersion: "16.0"
  defaultConfig: Debug
  createIntermediateGroups: true
  generateEmptyDirectories: false

settings:
  base:
    SWIFT_VERSION: "6.0"
    MACOSX_DEPLOYMENT_TARGET: "15.0"
    PRODUCT_BUNDLE_IDENTIFIER: com.topnetworks.notion-workspace
    PRODUCT_NAME: NotionWorkspace
    DEVELOPMENT_TEAM: ""
    CODE_SIGN_STYLE: Automatic
    ENABLE_HARDENED_RUNTIME: YES
    SWIFT_STRICT_CONCURRENCY: complete

targets:
  NotionWorkspace:
    type: application
    platform: macOS
    sources:
      - path: Sources
        type: group
    resources:
      - path: Resources/Assets.xcassets
    entitlements:
      path: Resources/NotionWorkspace.entitlements
      properties:
        com.apple.security.app-sandbox: true
        com.apple.security.network.client: true
        com.apple.security.files.user-selected.read-write: true
        com.apple.security.files.downloads.read-write: true
    info:
      path: Resources/Info.plist
      properties:
        CFBundleName: NotionWorkspace
        CFBundleDisplayName: Notion Workspace
        CFBundleIdentifier: com.topnetworks.notion-workspace
        CFBundleVersion: "1"
        CFBundleShortVersionString: "1.0.0"
        CFBundleExecutable: $(EXECUTABLE_NAME)
        CFBundlePackageType: APPL
        CFBundleDevelopmentRegion: en
        CFBundleInfoDictionaryVersion: "6.0"
        LSMinimumSystemVersion: "15.0"
        NSPrincipalClass: NSApplication
        NSSupportsAutomaticTermination: false
        NSSupportsSuddenTermination: false
        NSHumanReadableCopyright: "© 2025 TopNetworks Inc."
        # URL scheme for OAuth callback
        CFBundleURLTypes:
          - CFBundleURLName: com.topnetworks.notion-workspace
            CFBundleURLSchemes:
              - notion-workspace
        # Entitlements
        NSAppTransportSecurity:
          NSAllowsLocalNetworking: true
    settings:
      base:
        INFOPLIST_FILE: Resources/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
